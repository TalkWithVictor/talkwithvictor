<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Talk With Victor{% endblock %} 🇪🇸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --red:#E63946;--red2:#c1121f;--yellow:#FFD60A;
      --dark:#0D0D0D;--card:#161616;--card2:#1e1e1e;
      --border:rgba(255,255,255,0.08);--muted:#888;--text:#F0F0F0;
      --green:#2DC653;--sidebar:220px;
    }
    body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
    a{color:inherit;text-decoration:none;}
    input,textarea,select{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:.7rem 1rem;border-radius:8px;font-family:inherit;font-size:.9rem;width:100%;outline:none;transition:border-color .2s;}
    input:focus,textarea:focus,select:focus{border-color:var(--red);}
    label{display:block;font-size:.82rem;font-weight:600;color:#ccc;margin-bottom:.4rem;}
    .form-group{margin-bottom:1.2rem;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:.7rem 1.5rem;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;border:none;transition:all .2s;text-decoration:none;}
    .btn-red{background:var(--red);color:white;}
    .btn-red:hover{background:var(--red2);transform:translateY(-1px);}
    .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
    .btn-ghost:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.04);}
    .btn-green{background:var(--green);color:white;}
    .btn-green:hover{opacity:.9;}
    .btn-sm{padding:.4rem .9rem;font-size:.8rem;}
    .btn-danger{background:#c1121f;color:white;}
    .badge{display:inline-block;padding:.2rem .6rem;border-radius:100px;font-size:.7rem;font-weight:700;}
    .badge-green{background:rgba(45,198,83,.15);color:var(--green);border:1px solid rgba(45,198,83,.3);}
    .badge-red{background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.3);}
    .badge-yellow{background:rgba(255,214,10,.15);color:var(--yellow);border:1px solid rgba(255,214,10,.3);}
    .badge-muted{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border);}
    .alert{padding:.9rem 1.2rem;border-radius:8px;margin-bottom:1rem;font-size:.88rem;font-weight:500;}
    .alert-success{background:rgba(45,198,83,.1);border:1px solid rgba(45,198,83,.3);color:#2DC653;}
    .alert-danger{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:#FF6B7A;}
    .alert-warning{background:rgba(255,214,10,.1);border:1px solid rgba(255,214,10,.3);color:var(--yellow);}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;}
    .table{width:100%;border-collapse:collapse;font-size:.87rem;}
    .table th{text-align:left;padding:.7rem 1rem;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);}
    .table td{padding:.8rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
    .table tr:last-child td{border-bottom:none;}
    .table tr:hover td{background:rgba(255,255,255,.02);}
    /* App layout with sidebar */
    .app-layout{display:flex;min-height:100vh;}
    .sidebar{width:var(--sidebar);background:#0a0a0a;border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;overflow-y:auto;}
    .sidebar-logo{padding:1.5rem 1.2rem;border-bottom:1px solid var(--border);}
    .sidebar-logo .logo{font-size:1.2rem;font-weight:900;letter-spacing:-.5px;}
    .sidebar-logo .logo span{color:var(--red);}
    .sidebar-logo .role{font-size:.7rem;color:var(--muted);margin-top:.2rem;}
    .sidebar-nav{padding:1rem 0;flex:1;}
    .nav-item{display:flex;align-items:center;gap:.8rem;padding:.7rem 1.2rem;color:var(--muted);font-size:.85rem;font-weight:500;transition:all .2s;border-left:3px solid transparent;cursor:pointer;}
    .nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
    .nav-item.active{color:white;background:rgba(230,57,70,.08);border-left-color:var(--red);}
    .nav-section{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em;padding:.8rem 1.2rem .3rem;}
    .nav-icon{font-size:1.1rem;width:20px;text-align:center;}
    .sidebar-user{padding:1rem 1.2rem;border-top:1px solid var(--border);}
    .sidebar-user .name{font-size:.82rem;font-weight:700;}
    .sidebar-user .email{font-size:.72rem;color:var(--muted);}
    .main-content{margin-left:var(--sidebar);flex:1;min-height:100vh;}
    .topbar{background:#0a0a0a;border-bottom:1px solid var(--border);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;}
    .topbar-title{font-size:1rem;font-weight:700;}
    .page-body{padding:2rem;}
    .page-header{margin-bottom:2rem;}
    .page-header h1{font-size:1.6rem;font-weight:900;letter-spacing:-.5px;margin-bottom:.3rem;}
    .page-header p{color:var(--muted);font-size:.9rem;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;}
    .stat-card .num{font-size:2rem;font-weight:900;line-height:1;}
    .stat-card .lbl{font-size:.75rem;color:var(--muted);margin-top:.3rem;font-weight:500;}
    .stat-card .num.red{color:var(--red);}
    .stat-card .num.green{color:var(--green);}
    .stat-card .num.yellow{color:var(--yellow);}
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%);transition:transform .3s;}
      .sidebar.open{transform:translateX(0);}
      .main-content{margin-left:0;}
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script>
  // Flash messages auto-hide
  setTimeout(()=>{
    document.querySelectorAll('.alert').forEach(el=>el.style.opacity='0');
    setTimeout(()=>document.querySelectorAll('.alert').forEach(el=>el.remove()),400);
  },4000);
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
