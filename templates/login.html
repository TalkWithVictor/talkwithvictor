<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión – Talk With Victor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--red:#E63946;--red2:#c1121f;--yellow:#FFD60A;--dark:#0D0D0D;--card:#161616;--border:rgba(255,255,255,0.08);--muted:#888;--text:#F0F0F0;}
    body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .login-wrap{width:100%;max-width:420px;}
    .logo{text-align:center;margin-bottom:2.5rem;}
    .logo a{font-size:1.6rem;font-weight:900;letter-spacing:-.5px;color:var(--text);text-decoration:none;}
    .logo span{color:var(--red);}
    .logo p{color:var(--muted);font-size:.85rem;margin-top:.3rem;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;}
    .card h2{font-size:1.3rem;font-weight:900;margin-bottom:.3rem;}
    .card .sub{color:var(--muted);font-size:.85rem;margin-bottom:2rem;}
    label{display:block;font-size:.82rem;font-weight:600;color:#ccc;margin-bottom:.4rem;}
    .form-group{margin-bottom:1.2rem;}
    input{background:#1e1e1e;border:1px solid var(--border);color:var(--text);padding:.75rem 1rem;border-radius:8px;font-family:inherit;font-size:.9rem;width:100%;outline:none;transition:border-color .2s;}
    input:focus{border-color:var(--red);}
    .remember{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--muted);cursor:pointer;}
    .remember input{width:auto;}
    .btn-login{width:100%;padding:.9rem;background:var(--red);color:white;border:none;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s;margin-top:.5rem;}
    .btn-login:hover{background:var(--red2);transform:translateY(-1px);}
    .back{text-align:center;margin-top:1.5rem;font-size:.82rem;color:var(--muted);}
    .back a{color:var(--text);font-weight:600;}
    .alert{padding:.9rem 1.2rem;border-radius:8px;margin-bottom:1.2rem;font-size:.87rem;font-weight:500;}
    .alert-danger{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:#FF6B7A;}
    .alert-success{background:rgba(45,198,83,.1);border:1px solid rgba(45,198,83,.3);color:#2DC653;}
    .alert-warning{background:rgba(255,214,10,.1);border:1px solid rgba(255,214,10,.3);color:var(--yellow);}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <a href="/">Talk With <span>Victor</span> 🇪🇸</a>
    <p>Plataforma de español online</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <div class="card">
    <h2>Bienvenido de nuevo</h2>
    <p class="sub">Accede a tu área de miembro</p>

    <form method="POST">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <label class="remember">
        <input type="checkbox" name="remember"> Recordarme
      </label>
      <button type="submit" class="btn-login">Entrar →</button>
    </form>
  </div>

  <div class="back">
    ¿No tienes cuenta? <a href="/#pricing">Ver planes</a> &nbsp;·&nbsp; <a href="/">Volver al inicio</a>
  </div>
</div>
</body>
</html>
